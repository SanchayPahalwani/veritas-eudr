name: ci

# Lint, type/format check, migrate against a real PostGIS, run the full suite
# (incl. the @pytest.mark.postgis integration tests, which run only when a DB URL
# is present), then a README-style curl smoke against the running API.
on:
  push:
    branches: ["**"]
  pull_request:

# GitHub-hosted runners are linux/amd64, so the postgis image (amd64-only) runs
# natively here -- no emulation, unlike on an Apple-silicon developer laptop.
jobs:
  test:
    runs-on: ubuntu-latest

    # PostGIS as a service container. Pinned by tag AND digest to match the
    # compose stack exactly. Port 5432 is mapped to the runner host so job steps
    # reach it at 127.0.0.1:5432. The health options gate steps until it is ready.
    services:
      db:
        image: postgis/postgis:18-3.6@sha256:0d513af346b21c76bf084e90c0589043c30ff379025d079ce4befa9c3a539f72
        env:
          POSTGRES_USER: veritas
          POSTGRES_PASSWORD: veritas
          POSTGRES_DB: veritas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U veritas -d veritas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      # Both alembic (migrations/env.py) and the app (config.Settings) read this.
      # The conftest also keys the postgis-marked tests off DATABASE_URL /
      # VERITAS_DATABASE_URL, so setting it here makes those integration tests RUN
      # rather than skip. psycopg driver matches pyproject's psycopg[binary] pin.
      DATABASE_URL: postgresql+psycopg://veritas:veritas@127.0.0.1:5432/veritas
      VERITAS_DATABASE_URL: postgresql+psycopg://veritas:veritas@127.0.0.1:5432/veritas

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project + dev tooling
        # Installs the pinned dependency tree, including the bundled-GDAL geospatial
        # wheels (no system GDAL/PROJ needed -- see Dockerfile header).
        run: |
          python -m pip install --upgrade pip
          # Editable, mirroring the Dockerfile: a non-editable `pip install .` imports
          # veritas_eudr from site-packages, so config.PROJECT_ROOT (Path(__file__).parents[2])
          # resolves into site-packages' parent instead of the repo -- and the suite, which
          # reads tests/fixtures and policy/ via PROJECT_ROOT, can't find them.
          pip install -e .[dev]

      - name: Verify resolved geospatial stack
        # Mirror the Dockerfile's build-time check so the CI log records exactly
        # which native GDAL/GEOS the wheels linked against.
        run: |
          python -c "import rasterio,shapely,exactextract; print('rasterio',rasterio.__version__,'gdal',rasterio.__gdal_version__,'geos',shapely.geos_version,'exactextract',exactextract.__version__)"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Migrate (alembic upgrade head, asserts PostGIS/GEOS floors)
        run: alembic upgrade head

      - name: Test suite (postgis integration tests run, DB URL is set)
        run: pytest -q

      - name: API smoke (seed demo, serve, curl /health + /consignments/DEMO/dds)
        run: |
          set -euo pipefail
          # Seed the DEMO consignment from the committed messy fixture (same command
          # the container entrypoint runs), so the DDS endpoint has data.
          veritas-eudr run \
            tests/fixtures/submissions/messy_submission.geojson \
            --operator "Acme Coffee Co" \
            --consignment DEMO
          # Start the API in the background and wait for /health to come up.
          veritas-eudr serve --host 127.0.0.1 --port 8000 &
          server_pid=$!
          trap 'kill "${server_pid}" 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              echo "API is up."
              break
            fi
            if [ "${i}" -eq 30 ]; then
              echo "API did not become healthy in time." >&2
              exit 1
            fi
            sleep 1
          done
          echo "--- GET /health ---"
          curl -fsS http://127.0.0.1:8000/health
          echo
          echo "--- GET /consignments/DEMO/dds ---"
          curl -fsS http://127.0.0.1:8000/consignments/DEMO/dds
          echo

  # The `test` job above exercises the CLI -> DB -> API path against a PostGIS
  # *service* container, but never builds the image -- so the README's PRIMARY
  # delivery (`docker compose up --build`) could regress while CI stays green.
  # This job builds and runs the full compose stack. A build-only step would catch
  # only build-time breakage (e.g. a missing runtime lib surfacing in the Dockerfile
  # import check); the PGDATA mount path and the editable-install PROJECT_ROOT
  # resolution fail only at *runtime*, so we actually start the stack and walk the
  # documented curl flow. GitHub runners are native amd64, so the amd64 pin runs
  # without emulation.
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image + start the stack (docker compose up --build)
        run: docker compose up --build -d

      - name: Walk the README happy path against the running container
        run: |
          set -euo pipefail
          # Wait for the app entrypoint (wait-for-db -> migrate -> seed -> serve).
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/health >/dev/null; then echo "API is up."; break; fi
            if [ "${i}" -eq 60 ]; then echo "API did not become healthy in time." >&2; exit 1; fi
            sleep 3
          done
          # The seeded DDS must have plots; discover a real (content-hash) plot id
          # from it, then drill into the plot risk and the run's evidence trail --
          # exactly the flow documented in the README.
          curl -fsS http://localhost:8000/consignments/DEMO/dds | tee /tmp/dds.json \
            | jq -e '.plot_ids | length > 0' >/dev/null
          plot=$(jq -r '.plot_ids[0]' /tmp/dds.json)
          curl -fsS "http://localhost:8000/plots/${plot}/risk" | tee /tmp/risk.json \
            | jq -e '.plot_id and .assessed' >/dev/null
          run=$(jq -r '.risk.evidence[0].run_id' /tmp/risk.json)
          curl -fsS "http://localhost:8000/runs/${run}/replay" | jq -e '.evidence | length > 0' >/dev/null
          echo "Docker happy path OK: plot=${plot} run=${run}"

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
