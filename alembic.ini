# Alembic configuration for veritas-eudr.
#
# The database URL is intentionally NOT set here as a literal. env.py reads it
# from veritas_eudr.config.get_settings().database_url (env-overridable via
# VERITAS_DATABASE_URL / VERITAS_*), so the migration always targets the same
# PostGIS instance the app does. A blank sqlalchemy.url here is therefore expected.

[alembic]
# Path to migration scripts, relative to this file's directory.
script_location = migrations

# Template used to generate migration file names; date-prefixed for readability.
# file_template = %%(rev)s_%%(slug)s

# Set to 'true' to run the environment during the 'revision' command, regardless
# of autogenerate.
# revision_environment = false

# Resolved at runtime in env.py from veritas_eudr.config; left blank on purpose.
sqlalchemy.url =

[post_write_hooks]
# No post-write hooks configured.

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
